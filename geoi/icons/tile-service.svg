<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Tile Service = a 3x3 raster tile grid (gridded raster imagery). -->
  <g fill="#0ea5e9">
    <rect x="3"  y="3"  width="5" height="5" rx="0.8"/>
    <rect x="9.5" y="3" width="5" height="5" rx="0.8" fill="#0369a1"/>
    <rect x="16" y="3"  width="5" height="5" rx="0.8"/>
    <rect x="3"  y="9.5" width="5" height="5" rx="0.8" fill="#0369a1"/>
    <rect x="9.5" y="9.5" width="5" height="5" rx="0.8"/>
    <rect x="16" y="9.5" width="5" height="5" rx="0.8" fill="#0369a1"/>
    <rect x="3"  y="16" width="5" height="5" rx="0.8"/>
    <rect x="9.5" y="16" width="5" height="5" rx="0.8" fill="#0369a1"/>
    <rect x="16" y="16" width="5" height="5" rx="0.8"/>
  </g>
</svg>
